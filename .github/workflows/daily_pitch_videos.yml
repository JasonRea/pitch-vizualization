name: Daily Pitch Videos

on:
  schedule:
    # Runs every day at 12:00 UTC — matches the graphics workflow schedule
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Also allows manual triggering from the GitHub UI
    # with an optional date override (defaults to yesterday)
    inputs:
      date:
        description: 'Date to generate pitch videos for (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache apt packages to avoid re-downloading on every run
      - name: Cache system dependencies
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-manim-libs

      # Install system-level dependencies required by Manim (pycairo, ManimPango, ffmpeg)
      - name: Install system dependencies
        if: steps.cache-apt.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            ffmpeg \
            texlive-latex-base \
            texlive-fonts-recommended

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Resolve target date
      #    Uses manual input if provided, otherwise defaults to yesterday in ET
      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "TARGET_DATE=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            echo "TARGET_DATE=$(TZ='America/New_York' date -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_ENV
          fi
          echo "Generating pitch videos for: $TARGET_DATE"

      # Run script, generating all pitch split videos for every pitcher on the day
      - name: Generate pitch videos
        run: |
          python3 run_vizualization.py -dA "$TARGET_DATE" "high_quality"

      # Upload outputs to DigitalOcean Spaces
      #    Secrets are set in: GitHub repo → Settings → Secrets → Actions
      - name: Upload to DigitalOcean Spaces
        env:
          DO_SPACES_KEY:    ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}   # e.g. "baseballfornerds"
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}   # e.g. "nyc3"
        run: |
          python3 - <<'EOF'
          import boto3, os, glob
          from pathlib import Path

          session = boto3.session.Session()
          client = session.client(
              's3',
              region_name=os.environ['DO_SPACES_REGION'],
              endpoint_url=f"https://{os.environ['DO_SPACES_REGION']}.digitaloceanspaces.com",
              aws_access_key_id=os.environ['DO_SPACES_KEY'],
              aws_secret_access_key=os.environ['DO_SPACES_SECRET'],
          )

          bucket = os.environ['DO_SPACES_BUCKET']
          date   = os.environ['TARGET_DATE']

          output_files = glob.glob("media/videos/**/*.mp4", recursive=True)

          if not output_files:
              print("No video files found — check that -dA rendered at least one scene.")
              exit(1)

          for filepath in output_files:
              filename = Path(filepath).name
              s3_key   = f"vizualizations/{date}/videos/{filename}"
              client.upload_file(
                  filepath, bucket, s3_key,
                  ExtraArgs={'ACL': 'public-read', 'ContentType': 'video/mp4'}
              )
              print(f"Uploaded: https://{bucket}.{os.environ['DO_SPACES_REGION']}.digitaloceanspaces.com/{s3_key}")

          EOF
